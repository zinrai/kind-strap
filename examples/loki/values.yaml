deploymentMode: SingleBinary

loki:
  # Multi-tenant: every read/write must carry X-Scope-OrgID (the tenant id).
  # Promtail sets it per stream from the pod namespace; clients query with
  # logcli --org-id <namespace>.
  auth_enabled: true
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: filesystem

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: standard
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi

backend: {replicas: 0}
read: {replicas: 0}
write: {replicas: 0}

gateway:
  enabled: false

chunksCache:
  enabled: false

resultsCache:
  enabled: false

lokiCanary:
  enabled: false

test:
  enabled: false
